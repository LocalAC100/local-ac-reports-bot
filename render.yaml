# Render blueprint — provisions a single web service that runs everything:
# - HTTP server (for the GHL webhook endpoint and a /healthz check)
# - In-process node-cron jobs for the 12:00 PM and 7:30 PM ET reports
#
# To deploy: push this repo to GitHub, then in Render → New → Blueprint and
# point it at the repo. Render will pick up this file automatically.
services:
  - type: web
    name: local-ac-reports-bot
    runtime: node
    plan: starter
    region: ohio
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TIMEZONE
        value: America/New_York
      - key: PORT
        value: 3000
      - key: LEAD_RESPONSE_THRESHOLD_MINUTES
        value: "3"
      # Secrets below — fill these in via the Render dashboard, NOT here.
      - key: HUBSTAFF_REFRESH_TOKEN
        sync: false
      - key: HUBSTAFF_ORG_ID
        sync: false
      - key: GHL_LOCATION_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false
      - key: REPORT_RECIPIENT
        sync: false
