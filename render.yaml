# Render blueprint — provisions a single web service that runs everything:
# - HTTP server (dashboard, GHL webhook, /healthz)
# - In-process node-cron jobs for the 12:00 PM and 7:30 PM ET reports
# - SQLite database for users + alert/report archive (persistent disk)
services:
  - type: web
    name: local-ac-reports-bot
    runtime: node
    plan: starter
    region: ohio
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /healthz
    disk:
      name: control-room-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TIMEZONE
        value: America/New_York
      - key: PORT
        value: 3000
      - key: LEAD_RESPONSE_THRESHOLD_MINUTES
        value: "3"
      - key: RENDER
        value: "true"
      # Existing secrets — already configured via Render dashboard
      - key: HUBSTAFF_REFRESH_TOKEN
        sync: false
      - key: HUBSTAFF_ORG_ID
        sync: false
      - key: GHL_LOCATION_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_WeBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false
      - key: REPORT_RECIPIENT
        sync: false
      # Control Room — auth + bot identity
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Anthropic — for Ask Claude tab
      - key: ANTHROPIC_API_KEY
        sync: false
      # Jobber — for Ask Claude data access AND Gross Profit invoice sync
      - key: JOBBER_CLIENT_ID
        sync: false
      - key: JOBBER_CLIENT_SECRET
        sync: false
      - key: JOBBER_ACCESS_TOKEN
        sync: false
      - key: JOBBER_REFRESH_TOKEN
        sync: false
      - key: JOBBER_WEBHOOK_SECRET
        sync: false
      # Google Sheets + Gmail — single service account, JSON key as a string
      - key: GOOGLE_SA_JSON
        sync: false
      - key: CHRIS_SHEET_ID
        sync: false
      - key: CHRIS_SHEET_RANGE
        sync: false
      - key: MIRROR_SHEET_ID
        sync: false
      - key: MIRROR_SHEET_TAB
        sync: false
      # Gmail watcher — Workspace user the SA impersonates (domain-wide delegation)
      - key: GMAIL_DELEGATED_USER
        value: office@local-ac.com
  # Node TZ — makes node-cron fire at local ET times (not UTC).
  - key: TZ
    value: America/New_York
